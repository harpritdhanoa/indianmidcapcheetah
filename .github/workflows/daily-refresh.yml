name: Daily refresh

on:
  schedule:
    # 10:30 UTC = 4:00 PM IST. GitHub Actions cron is always UTC.
    - cron: "30 10 * * *"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

permissions:
  contents: write   # needed so the workflow can commit the refreshed data/HTML back

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily refresh pipeline
        run: python daily_refresh.py

      - name: Commit and push if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes (likely a non-trading day) - nothing to commit."
          else
            git commit -m "Daily refresh: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
